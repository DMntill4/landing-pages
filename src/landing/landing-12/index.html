<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Landing Page 11</title>
</head>
<body>

    <div class="container">
        
        <svg class="decoration waves" viewBox="0 0 200 60"><path d="M0,20 Q25,0 50,20 T100,20 T150,20 T200,20" fill="none" stroke="#333" stroke-width="1"/><path d="M0,35 Q25,15 50,35 T100,35 T150,35 T200,35" fill="none" stroke="#333" stroke-width="1"/><path d="M0,50 Q25,30 50,50 T100,50 T150,50 T200,50" fill="none" stroke="#333" stroke-width="1"/></svg>
        
        <svg class="decoration star-middle" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="black"/><g stroke="#333" stroke-width="0.5"><line x1="50" y1="50" x2="100" y2="50"/><line x1="50" y1="50" x2="0" y2="50"/><line x1="50" y1="50" x2="50" y2="0"/><line x1="50" y1="50" x2="50" y2="100"/><line x1="50" y1="50" x2="85" y2="15"/><line x1="50" y1="50" x2="15" y2="85"/><line x1="50" y1="50" x2="85" y2="85"/><line x1="50" y1="50" x2="15" y2="15"/></g></svg>

        <section class="hero-text">
            <h1>Discover.<br>Explore.<br>Inspire.</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Faucibus in libero risus semper habitant arcu eget.</p>
            <button class="btn-explore">Explore</button>
        </section>

        <img src="./images/blanca abajo.png" alt="Blue abstract" class="card-img img-blue">
        
        <img src="./images/morada medio.png" alt="Purple abstract" class="card-img img-purple">
        
        <img src="./images/azul arriba.png" alt="Pink abstract" class="card-img img-pink">

        <svg class="decoration spiral" viewBox="0 0 100 200">
            <path d="M10,10 C80,10 80,40 10,40 C80,40 80,70 10,70 C80,70 80,100 10,100 C80,100 80,130 10,130 C80,130 80,160 10,160" fill="none" stroke="#333" stroke-width="1.5"/>
        </svg>

        <svg class="decoration star-bottom" viewBox="0 0 100 100">
            <g stroke="#333" stroke-width="0.3">
                <line x1="50" y1="50" x2="100" y2="50"/><line x1="50" y1="50" x2="0" y2="50"/><line x1="50" y1="50" x2="50" y2="0"/><line x1="50" y1="50" x2="50" y2="100"/>
                <line x1="50" y1="50" x2="85" y2="15"/><line x1="50" y1="50" x2="15" y2="85"/><line x1="50" y1="50" x2="85" y2="85"/><line x1="50" y1="50" x2="15" y2="15"/>
            </g>
        </svg>

        <footer class="testimonial">
            <img src="./images/guy.png" alt="User Avatar" class="avatar">
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Faucibus in libero risus semper habitant arcu eget. Et integer facilisi eget diam.</p>
        </footer>

    </div>

</body>
</html>
